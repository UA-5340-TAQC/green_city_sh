name: CI for GreenCity (.NET + NUnit)

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]

permissions:
  pull-requests: write
  checks: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Code style check (lint)
        run: dotnet format --verify-no-changes


  tests:
    runs-on: ubuntu-latest
    needs: build
    name: Run NUnit Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # 🔍 ВАЖЛИВО: перевірка що тести існують
      - name: List tests
        run: dotnet test --list-tests

      - name: Run tests
        continue-on-error: true
        run: |
          dotnet test green_city_sh.Tests/green_city_sh.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test_results.trx" \
            --results-directory TestResults

        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BROWSER: ${{ secrets.BROWSER }}
          DEFAULT_TIMEOUT: ${{ secrets.DEFAULT_TIMEOUT }}
          HEADLESS: ${{ secrets.HEADLESS }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}

      # 📦 Зберігаємо стандартні результати (обов'язково!)
      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: TestResults

      # 🔍 IMPORTANT: Check that allure-results are created
      - name: Find allure results
        run: |
          echo "Searching for allure-results..."
          find . -type d -name "allure-results"


      # 📦 Allure (optional)
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: "**/allure-results"
        if: always()
        continue-on-error: true


  report:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results-merged

      - name: Merge Allure results
        run: |
          mkdir allure-results
          find allure-results-merged -type f \( -name "*.json" -o -name "*.png" \) -exec cp {} allure-results \;

      - name: Get Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure report
        id: allure-report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          subfolder: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}

      - name: Fix ownership
        run: sudo chown -R $USER:$USER allure-history

      - name: Generate index.html
        run: |
          REPORT_DIR="allure-history"
          INDEX_FILE="$REPORT_DIR/index.html"

          echo "<!DOCTYPE html>
          <html>
          <head>
            <meta charset='UTF-8'>
            <title>Allure Reports</title>
          </head>
          <body>
          <h1>📊 Allure Reports</h1>
          <ul>" > $INDEX_FILE

          if [ -d "$REPORT_DIR/main" ]; then
            echo "<li><a href='./main/'>main</a></li>" >> "$INDEX_FILE"
          fi

          find "$REPORT_DIR" -maxdepth 1 -type d -name "pr-*" \
            | sort -r \
            | while read dir; do
              name=$(basename "$dir")
              echo "<li><a href='./$name/'>$name</a></li>" >> "$INDEX_FILE"
            done

          echo "</ul></body></html>" >> "$INDEX_FILE"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            📊 **Allure Test Report for PR-${{ github.event.number }}**
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}/
          comment_tag: allure-report-link
