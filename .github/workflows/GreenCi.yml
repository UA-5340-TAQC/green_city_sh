name: CI for GreenCity (.NET + NUnit)

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]

permissions:
  pull-requests: write
  checks: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Code style check (lint)
        run: dotnet format --verify-no-changes


  tests:
    runs-on: ubuntu-latest
    needs: build
    name: Run NUnit Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # 🔍 ВАЖЛИВО: перевірка що тести існують
      - name: List tests
        run: dotnet test --list-tests

      - name: Run tests
        run: |
          dotnet test green_city_sh.Tests/green_city_sh.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test_results.trx" \
            --results-directory TestResults

        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BROWSER: ${{ secrets.BROWSER }}
          DEFAULT_TIMEOUT: ${{ secrets.DEFAULT_TIMEOUT }}
          HEADLESS: ${{ secrets.HEADLESS }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}

      # 📦 Зберігаємо стандартні результати (обов'язково!)
      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: TestResults

      # 🔍 DEBUG: дивимось чи є allure-results
      - name: Debug allure folder
        run: |
          echo "=== ALLURE FILES ==="
          ls -R || true
          if [ -d "allure-results" ]; then
            echo "Allure results exist"
            ls -R allure-results
          else
            echo "No allure-results folder"
          fi

      # 📦 Allure (optional)
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
        if: always()
        continue-on-error: true


  report:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results
        continue-on-error: true

      - name: Check if Allure results exist
        id: check_allure
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Allure history
        if: steps.check_allure.outputs.has_results == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure report
        if: steps.check_allure.outputs.has_results == 'true'
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          subfolder: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}

      - name: Deploy to GitHub Pages
        if: steps.check_allure.outputs.has_results == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Comment PR with report link
        if: github.event_name == 'pull_request' && steps.check_allure.outputs.has_results == 'true'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            📊 **Allure Report**
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}/
          comment_tag: allure-report